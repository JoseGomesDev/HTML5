<!DOCTYPE html>

<html>

	<head>

		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title> Listas ordenadas e não ordenadas </title>

	</head>



	<body>

		<!-- UL = lista não ordenada, types: circle, square, disc -->
		<!-- LI = itens da lista -->

		<h2>Mapa do Site</h2>

		<ul type="square">
			<li>Home</li>
			<li>Quem Somos</li>
			<li>Contato</li>
		</ul>
		
		<!-- OL = lista ordenada, types: 1, A, a, I -->

		<h2>Perguntas</h2>

		<ol type="A">
			<li>Comida favorita?</li>
			<li>Carro favorito?</li>
			<li>Série favorita?</li>
		</ol>


	</body>




</html>
