<!DOCTYPE html>

<html>

	<head>

		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Novas tags input HTML5</title>
				<link rel="stylesheet" type="text/css" href="css/estilo.css">
				
	</head>

	<body>

		<form>
			
			<label for="nome">Nome</label>
			<input type="text" name="nome" id="nome">
			<br><br>

			<label for="email">Email</label>
			<input type="email" name="email">
			<br><br>

			<label for="numero">Número</label>
			<input type="number" id="numero" min="1" max="20" step="5">
			<br><br>

			<label for="url">Url</label>
			<input type="url" id="url" placeholder="Ex: https://www.google.com.br/">
			<br><br>

			<label for="pesquisa">Pesquisa</label>
			<input type="search" id="pesquisa">
			<br><br>

			<label for="range">Range</label>
			<input type="range" id="range" min="1" max="20" value="4">
			<br><br>

			<label for="data">Data</label>
			<input type="date" id="data">
			<br><br>

			<label for="cor">Cor</label>
			<input type="color" id="cor">
			<br><br>

			<input type="submit" name="" value="Enviar">


		</form>
		

	</body>

</html>
